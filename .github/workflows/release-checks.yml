name: Release Checks

on:
  workflow_dispatch:

jobs:
  release-checks:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install lightgbm
      - name: Run tests
        run: pytest -q
